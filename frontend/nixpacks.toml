[phases.setup]
nixPkgs = ["nodejs_18"]

[phases.install]
cmds = ["npm install --legacy-peer-deps --no-audit --no-fund"]

[phases.build]
cmds = ["npm run build"]

# Custom Node server: serves the static build AND injects branding/SEO/Open-Graph
# meta per request (social link previews). Replaces `vite preview`.
[start]
cmd = "node server.cjs"
